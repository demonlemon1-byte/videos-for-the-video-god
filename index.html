
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEST</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #34FFB9;
    color: white;
    text-align: center;
    padding: 40px 20px;
}

a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.game-wrapper {
    margin: 30px auto;
    max-width: 900px;
}

.game-container {
    position: relative;
    width: 100%;
    height: 600px;
    background: rgba(0,0,0,0.5);
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(95,158,160,0.8);
    overflow: hidden;
}

/* Updated container to handle video scaling */
#video-container {
    width: 100%;
    height: 100%;
    outline: none;
    position: relative;
    background: black;
}

video {
    width: 100%;
    height: 100%;
    object-fit: contain; /* Keeps aspect ratio */
}

/* Fullscreen Fix */
.game-container:fullscreen {
    width: 100vw;
    height: 100vh;
    border-radius: 0;
}

.fullscreen-btn {
    margin-top: 15px;
    padding: 10px 20px;
    background: #222;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    font-size: 14px;
}

.fullscreen-btn:hover {
    background: #333;
}

/* Keyboard overlay */
#keyboard-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: bold;
    cursor: default;
    z-index: 100;
    color: white;
    text-align: center;
}
#keyboard-overlay small {
    font-size: 16px;
    margin-top: 10px;
}
</style>
</head>
<body>

<h1>TEST</h1>
<p><a href="../index.html">← Back to Home</a></p>

<div class="game-wrapper">
    <div class="game-container" id="gameContainer">
        <div id="video-container" tabindex="0">
            <video id="myVideo" preload="auto">
                <source src="https://drive.google.com/uc?id=12aIoWlYOK65NAy3x3g-6WpRR-UHRbl_-" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            
            <div id="keyboard-overlay">
                I couldn't figure out how to get rid of this, press space.<br>
            </div>
        </div>
    </div>

    <button class="fullscreen-btn" onclick="goFullscreen()">
        ⛶ Fullscreen
    </button>
</div>

<script>
const video = document.getElementById("myVideo");
const overlay = document.getElementById("keyboard-overlay");

// Function to start video
function startVideo() {
    overlay.style.display = "none"; 
    video.play();
    video.controls = true; // Shows controls after starting
    document.removeEventListener("keydown", keyHandler);
}

// Handle Spacebar
function keyHandler(e) {
    if (e.code === "Space") {
        e.preventDefault(); // Prevents page scrolling
        startVideo();
    }
}

document.addEventListener("keydown", keyHandler);

// Fullscreen helper
function goFullscreen() {
    const elem = document.getElementById("gameContainer");
    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
    }
}
</script>

</body>
</html>
